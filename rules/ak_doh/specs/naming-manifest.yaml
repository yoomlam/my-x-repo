    policy_phrase: "after applying federal-law-authorized exclusions (step 1)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2A; 442-4 step 1"
  after_eitc:
    policy_phrase: "after removing EITC and Child Tax Credit payments (step 2)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2B; 442-4 step 2"
  after_irregular:
    policy_phrase: "after excluding infrequent/irregular earned income up to $10/month (step 3)"
    source_doc: "442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    section: "442-1A; 442-2C; 442-4 step 3"
  after_student:
    policy_phrase: "after excluding student earned income up to monthly limit (step 4)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2D; 442-4 step 4"
  after_general_20:
    policy_phrase: "after applying unused $20 general exclusion remainder (step 5)"
    source_doc: "442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    section: "442-1B; 442-2E; 442-4 step 5"
  after_65:
    policy_phrase: "after excluding the first $65 of remaining earned income (step 6)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2F; 442-4 step 6"
  after_irwe:
    policy_phrase: "after subtracting impairment-related work expenses (step 7)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2G; 442-4 step 7"
  after_half:
    policy_phrase: "after one-half deduction of remaining earned income (step 8)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2H; 442-4 step 8"
  after_blind:
    policy_phrase: "after subtracting blind work expenses (step 9)"
    source_doc: "442-2 EARNED INCOME EXCLUSIONS.md"
    section: "442-2I; 442-4 step 9"
  dol_avg_monthly_income:
    policy_phrase: "DOL quarterly earnings divided by three to get average monthly income"
    source_doc: "523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    section: "523B — Reasonable Compatibility"
