sections:
  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "## 523 MEDICAID EXCEPTIONS TO APA INCOME POLICY"
    summary: "Introduces the Medicaid-specific deviations from standard APA income policy that govern how countable income is determined for Medicaid eligibility."
    tags: [Medicaid, income policy, APA exceptions, countable income]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 A. SOCIAL SECURITY BENEFITS"
    summary: "Social Security COLA increases are disregarded for grandfathered individuals protected under the Pickle Amendment and related provisions."
    tags: [Social Security, COLA, grandfathered recipients, income disregard]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 B. REASONABLE COMPATIBILITY"
    summary: "Income is reasonably compatible when DOL-reported monthly average (quarterly total divided by 3) falls within 10% of the client-stated gross income after applying standard exclusions."
    tags: [reasonable compatibility, earned income verification, DOL data, income comparison]
    computations:
      - description: "Convert DOL quarterly earnings to average monthly income."
        variables: [dol_quarterly_earnings, dol_avg_monthly_income]
        expr_hint: "dol_quarterly_earnings / 3"
      - description: "Apply the $20 and $65 exclusions and half-deduction to client-stated gross earned income to get the adjusted comparison base."
        variables: [client_gross_earned, general_exclusion, earned_exclusion, adjusted_client_income]
        expr_hint: "(client_gross_earned - 20 - 65) / 2"
      - description: "Determine the 10% tolerance band around the adjusted client-stated income and check whether the DOL-adjusted figure falls within it."
        variables: [adjusted_client_income, tolerance, dol_avg_monthly_adjusted, is_compatible]
        expr_hint: "abs(dol_avg_monthly_adjusted - adjusted_client_income) <= adjusted_client_income * 0.10"

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 C. POST-ELIGIBILITY DETERMINATION"
    summary: "SSI benefits are disregarded in the post-eligibility cost-of-care calculation for the first two months of institutionalization when the person received SSI the prior month."
    tags: [post-eligibility, SSI disregard, institutionalization, cost of care]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 D. COST-OF-CARE DETERMINATION"
    summary: "SSA overpayment withheld amounts are disregarded in post-eligibility cost-of-care calculations, and federal tax returns cannot be used for institutional cost-of-care determinations."
    tags: [cost of care, SSA overpayment, tax returns, post-eligibility]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 E. VETERANS AFFAIRS PAYMENTS"
    summary: "VA payments up to $200 per month are excluded from the post-eligibility cost-of-care computation for Medicaid recipients residing in state Veterans' Homes or institutional facilities."
    tags: [Veterans Affairs, income exclusion, post-eligibility, institutional care]
    computations:
      - description: "Exclude VA payments up to $200/month from the post-eligibility income calculation."
        variables: [va_monthly_payment, va_excluded_amount, va_countable_amount]
        expr_hint: "va_excluded_amount = min(va_monthly_payment, 200)"

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 F. INCOME DISREGARDS"
    summary: "Income disregards (including the $20 general disregard) are not applied when determining financial eligibility for the Special Long Term Care category, and community-spouse income deeming rules differ from standard APA policy."
    tags: [income disregards, Special Long Term Care, spousal deeming, LTC eligibility]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 G. FEDERAL POVERTY GUIDELINES FOR ALASKA"
    summary: "Federal Poverty Guidelines for Alaska replace the APA standard when determining eligibility for QMB, SLMB, and QDWI Medicaid categories."
    tags: [Federal Poverty Guidelines, QMB, SLMB, QDWI, Medicaid eligibility standards]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 H. IN-KIND SUPPORT AND MAINTENANCE"
    summary: "APA in-kind support and maintenance policy does not apply to the Special Long Term Care eligibility category, which follows its own rules for counting in-kind income."
    tags: [in-kind support, Special Long Term Care, income exceptions, Medicaid]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 I. INDIVIDUAL INDIAN MONEY ACCOUNTS"
    summary: "Funds held in Individual Indian Money (IIM) accounts are fully excluded as income for Medicaid eligibility and cost-of-care determinations."
    tags: [Individual Indian Money, IIM, income exclusion, Alaska Native]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 MEDICAID EXCEPTIONS TO APA RESOURCE POLICY"
    summary: "Introduces Medicaid-specific exceptions to APA resource policy governing how resource value and countability are determined for Medicaid eligibility."
    tags: [Medicaid, resource policy, APA exceptions, countable resources]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 A. REASONABLE COMPATIBILITY"
    summary: "Resources are reasonably compatible when client-stated and AVS-reported resource totals both fall below the $2,000 Medicaid resource limit; discrepancies above the limit require further verification."
    tags: [reasonable compatibility, resource verification, AVS, resource limit]
    computations:
      - description: "Sum all client-stated countable resources and compare against the Medicaid resource limit."
        variables: [client_stated_resources, resource_limit, client_below_limit]
        expr_hint: "sum(client_stated_resources) <= resource_limit"
      - description: "Sum AVS-reported and client-stated resources (using higher value for matched accounts) and compare against the resource limit to determine compatibility."
        variables: [avs_resources, client_stated_resources, total_avs_client_resources, resource_limit, is_compatible]
        expr_hint: "sum(max(avs_value, client_value) for each matched account + new_avs_accounts) <= resource_limit"

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 B. COMMUNITY SPOUSE RESOURCE ALLOWANCE"
    summary: "Resources may be transferred from the institutionalized spouse to the community spouse up to the allowance amount specified in Addendum 1 to qualify for Medicaid under the Special Long Term Care category."
    tags: [community spouse, resource allowance, spousal impoverishment, Long Term Care]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 C. CONDITIONAL BENEFITS"
    summary: "APA conditional benefits policy does not apply to Medicaid; Medicaid does not provide conditional benefits."
    tags: [conditional benefits, Medicaid exception, APA policy]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 D. PROPERTY FOR SALE"
    summary: "APA policy exempting property listed for sale does not apply to Medicaid-only determinations; Medicaid has no exemption for property up for sale."
    tags: [property for sale, resource exceptions, Medicaid-only, real property]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 E. TRANSFER OF RESOURCES"
    summary: "APA transfer-of-resources policy does not apply to Medicaid-only determinations; federal tax return proceeds are exempt from transfer penalties for 12 months after receipt."
    tags: [transfer of resources, Medicaid exception, transfer penalty, tax returns]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 F. INSTITUTIONAL ALLOTMENT OF RESOURCES"
    summary: "APA spousal financial-responsibility rules do not apply to institutional or waiver applicants; resource eligibility is instead governed by Section 553-D."
    tags: [institutional, spousal resources, resource allotment, waiver]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 g. INSTITUTIONALIZED INDIVIDUALS WITH SUBSTANTIAL HOME EQUITY"
    summary: "The APA home-equity exemption does not apply to institutional or waiver applicants seeking long-term care services; substantial home equity may affect eligibility."
    tags: [home equity, institutionalized, resource exemption, Long Term Care]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 H. PROMISSORY NOTES, LOANS, AND PROPERTY AGREEMENTS"
    summary: "APA policy on promissory notes, loans, and property agreements does not apply to institutional or waiver applicants for transfer-of-asset purposes; Section 554-H governs instead."
    tags: [promissory notes, loans, transfer of assets, institutional]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 I. LIFE ESTATES"
    summary: "APA life estate policy does not apply to institutional or waiver applicants for transfer-of-asset purposes; Section 554-J governs purchase of life estates."
    tags: [life estates, transfer of assets, institutional, Medicaid exception]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 J. RESOURCE LIMIT FOR THE WORKING DISABLED BUY-IN CATEGORY"
    summary: "The standard APA resource limit does not apply to the Working Disabled Buy-In Medicaid category; a different limit specified in Section 534-B applies instead."
    tags: [Working Disabled, Buy-In, resource limit, Medicaid exception]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 K. INDIVIDUAL INDIAN MONEY ACCOUNTS"
    summary: "Funds held in Individual Indian Money (IIM) accounts are excluded as a resource, but once withdrawn they become a countable resource."
    tags: [Individual Indian Money, IIM, resource exclusion, Alaska Native]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 L. ALASKA NATIVE AND AMERICAN INDIAN REAL PROPERTY RESOURCE EXCLUDED"
    summary: "All real property in Alaska owned by an Alaska Native or American Indian is excluded as a countable resource and is not subject to transfer-of-asset penalties, including land that passes to relatives."
    tags: [Alaska Native, American Indian, real property, resource exclusion]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 M. DINGELL ACT LANDS"
    summary: "Up to 160 acres of land received under the Dingell Act by eligible Alaska Native veterans is an exempt resource."
    tags: [Dingell Act, Alaska Native, land allotment, resource exemption]

  - path: "input/policy_docs/adltc_manual/Addendum 1 - Expanded Refuse Cash Income Limits.md"
    heading: "## EXPANDED REFUSED CASH INCOME LIMITS"
    summary: "Provides the annual income limit thresholds by household type (individual, couple, ALH, nursing home) used to determine the Expanded Refused Cash income eligibility standard for 2024–2026."
    tags: [income limits, household type, ADLTC Medicaid, eligibility thresholds]
    computations:
      - description: "Look up the applicable income limit for a given household type and benefit year."
        variables: [household_type, benefit_year, income_limit]
        expr_hint: "income_limit = table[household_type][benefit_year]"

  - path: "input/policy_docs/apa_manual/441/441 COUNTABLE INCOME.md"
    heading: "## 441 COUNTABLE INCOME"
    summary: "Introduces the APA chapter on countable income, noting that certain income of spouses and alien sponsors may be deemed available and that deeming rules are covered in chapter 460."
    tags: [countable income, APA, deeming, income eligibility]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "## 441-1 EARNED INCOME"
    summary: "Defines earned income broadly and lists the types of payments that qualify as earned income under APA policy."
    tags: [earned income, APA, income types, definition]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 A. WAGES"
    summary: "Wages (salaries, commissions, bonuses, severance, and special employment payments received before deductions) count as earned income in the month of receipt."
    tags: [wages, earned income, employment, month of receipt]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 B. FLEXIBLE HEALTH BENEFITS"
    summary: "Only the portion of employer-paid flexible health benefits that flows directly to the employee as excess (rather than going entirely to mandatory health insurance) is counted as earned income."
    tags: [flexible health benefits, employer contributions, countable income, health insurance]
    computations:
      - description: "Calculate the countable portion of flexible health benefits as the excess paid directly to the employee."
        variables: [employer_flexible_benefit, mandatory_health_insurance_cost, countable_benefit_income]
        expr_hint: "countable_benefit_income = employer_flexible_benefit - mandatory_health_insurance_cost"

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "## 441-1 C. SICK LEAVE"
    summary: "Sick leave is earned income if received within six months of work stoppage due to sickness or disability; sick leave received after six months is classified as unearned income."
    tags: [sick leave, earned income, unearned income, disability]
    computations:
      - description: "Classify sick leave as earned or unearned based on months elapsed since work stoppage."
        variables: [months_since_work_stopped, is_earned_income]
        expr_hint: "is_earned_income = months_since_work_stopped <= 6"

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 D. GARNISHMENTS AGAINST EARNED INCOME"
    summary: "Wages withheld from earned income to satisfy a debt or legal obligation still count as earned income to the individual."
    tags: [garnishment, earned income, wage withholding, legal obligation]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 E. NET EARNINGS FROM SELF-EMPLOYMENT"
    summary: "Net self-employment income equals gross self-employment income minus allowable deductions (either a 50% standard deduction or actual verified expenses), averaged monthly over the taxable year; net losses offset only other earned income."
    tags: [self-employment, net income, standard deduction, business expenses]
    computations:
      - description: "Calculate allowable business deduction using the standard 50% rate."
        variables: [gross_self_employment_income, standard_deduction]
        expr_hint: "standard_deduction = gross_self_employment_income * 0.50"
      - description: "Calculate net self-employment income for the year using the higher of standard or actual deductions."
        variables: [gross_self_employment_income, actual_expenses, standard_deduction, net_annual_self_employment]
        expr_hint: "net_annual_self_employment = gross_self_employment_income - max(standard_deduction, actual_expenses)"
      - description: "Determine monthly net self-employment income by averaging the annual net over 12 months."
        variables: [net_annual_self_employment, monthly_net_self_employment]
        expr_hint: "monthly_net_self_employment = net_annual_self_employment / 12"

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 F. EARNINGS FROM SHELTERED WORKSHOP OR WORK ACTIVITIES CENTER"
    summary: "Payments received for participating in a sheltered workshop or work activities center program are counted as earned income."
    tags: [sheltered workshop, work activities, earned income, disability employment]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "## 441-2 UNEARNED INCOME"
    summary: "Defines unearned income as any income that is not earned and lists the types of payments classified as unearned income under APA policy."
    tags: [unearned income, APA, income classification, definition]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 A. BENEFITS PAID UNDER TITLE II OF THE SOCIAL SECURITY ACT"
    summary: "RSDI (retirement, survivors, disability) monthly benefits count as unearned income, including the Medicare Part B premium amount deducted from the benefit."
    tags: [RSDI, Social Security, unearned income, Medicare Part B]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 B. ANNUITIES, PENSIONS, RETIREMENT, OR DISABILITY PAYMENTS"
    summary: "Annuities, pensions, retirement benefits, and disability benefits (unless paid within 6 months of last work) all count as unearned income."
    tags: [annuities, pensions, retirement, disability payments, unearned income]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 C. DEPARTMENT OF VETERANS AFFAIRS PAYMENTS"
    summary: "VA compensation and pension payments are countable unearned income (except Medal of Honor pension, clothing allowance, and augmented dependent portions), with the $20 general exclusion not applying to needs-based VA payments."
    tags: [Veterans Affairs, VA payments, unearned income, needs-based]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 D. INCOME BASED ON NEED"
    summary: "Needs-based income (federally or privately funded programs using income as an eligibility factor) is countable unearned income, but the $20 general exclusion does not apply to it."
    tags: [needs-based income, unearned income, $20 exclusion, SSI, BIA]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 E. WORKERS' COMPENSATION PAYMENTS"
    summary: "Workers' compensation payments to injured employees or their survivors are countable unearned income, excluding any portions the payor designates for medical or legal expenses."
    tags: [workers compensation, unearned income, injury, medical expense exclusion]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 F. UNEMPLOYMENT INSURANCE BENEFITS"
    summary: "Unemployment insurance benefits (including amounts paid by unions or employers as unemployment benefits) are countable unearned income."
    tags: [unemployment insurance, unearned income, benefits]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 G. DEATH BENEFITS"
    summary: "Death benefits (life insurance, lump-sum SSA payments, inheritances, and cash gifts related to death) are countable income only to the extent they exceed verified last-illness and burial expenses."
    tags: [death benefits, life insurance, burial expenses, countable income]
    computations:
      - description: "Calculate countable death benefit income as the excess of total death benefits over verified burial and last-illness expenses."
        variables: [total_death_benefits, total_burial_expenses, countable_death_benefit]
        expr_hint: "countable_death_benefit = max(0, total_death_benefits - total_burial_expenses)"

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 H. AWARDS"
    summary: "Court awards and settlements count as unearned income in the month of receipt, reduced by any verified portion designated for medical or legal expenses of obtaining the award."
    tags: [awards, court settlements, unearned income, legal expenses]
    computations:
      - description: "Reduce the countable award amount by portions designated for medical or legal expenses of obtaining the award."
        variables: [gross_award, medical_legal_expenses, countable_award]
        expr_hint: "countable_award = max(0, gross_award - medical_legal_expenses)"

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 I. CASH GIFTS"
    summary: "Cash gifts received irrevocably without repayment obligation count as unearned income, though small infrequent gifts may qualify for the infrequent/irregular income exclusion."
    tags: [cash gifts, unearned income, infrequent income, donations]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 J. PRIZES"
    summary: "Cash prizes from contests, lotteries, or games of chance are unearned income in the month of receipt and cannot be offset by gambling losses; prizes are not anticipated income."
    tags: [prizes, gambling, unearned income, month of receipt]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 K. INHERITANCE"
    summary: "Cash inheritances and liquid assets received as a result of someone's death are unearned income; property inheritances are treated as in-kind support and maintenance rather than income."
    tags: [inheritance, unearned income, in-kind support, liquid assets]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 L. SUPPORT AND ALIMONY PAYMENTS"
    summary: "Support and alimony payments received for the individual's own needs count as unearned income; child support for a child in the home is not countable, but one-third of child support is excluded under Section 442-3I."
    tags: [support payments, alimony, child support, unearned income]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 M. RENTAL INCOME"
    summary: "Net rental income (gross rent minus ordinary and necessary expenses) counts as unearned income unless the recipient is actively self-employed in the rental business."
    tags: [rental income, net rent, unearned income, self-employment]
    computations:
      - description: "Calculate net rental income as gross rent less ordinary and necessary rental expenses."
        variables: [gross_rent, ordinary_necessary_expenses, net_rental_income]
        expr_hint: "net_rental_income = gross_rent - ordinary_necessary_expenses"

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "## 441-2 N. HOME OWNER INCOME FROM ROOM RENTAL"
    summary: "For a homeowner renting a room, countable income is the room rent minus a prorated share of allowable household expenses based on the ratio of rented rooms to total non-bathroom rooms."
    tags: [room rental, homeowner, prorated expenses, net rental income]
    computations:
      - description: "Prorate allowable household expenses by the fraction of rooms designated for rent."
        variables: [total_household_expenses, rental_rooms, total_non_bathroom_rooms, prorated_expenses]
        expr_hint: "prorated_expenses = total_household_expenses * (rental_rooms / total_non_bathroom_rooms)"
      - description: "Calculate countable net room-rental income as room rent minus prorated allowable expenses."
        variables: [room_rental_income, prorated_expenses, countable_room_rental_income]
        expr_hint: "countable_room_rental_income = room_rental_income - prorated_expenses"

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 O. ROYALTIES"
    summary: "Royalty payments count as unearned income unless received in connection with the individual's own published work or as part of a trade or business, in which case they are earned self-employment income."
    tags: [royalties, unearned income, self-employment, copyright]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 P. DEPOSITS MADE TO A JOINT ACCOUNT"
    summary: "Deposits made to a joint account by a non-APA co-owner are income to the APA applicant, unless ownership of those funds is formally contested and access restricted."
    tags: [joint accounts, deposits, unearned income, co-owner]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 Q. RETROACTIVE PAYMENTS"
    summary: "Retroactive benefit payments (other than retroactive SSI and RSDI benefits, which are handled under Section 440-2) count as income in the month of receipt."
    tags: [retroactive payments, unearned income, month of receipt, SSI RSDI exception]

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "## 442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH"
    summary: "Introduces income exclusions that apply to both earned and unearned income, noting they are applied first to unearned income and then to earned income."
    tags: [income exclusions, earned income, unearned income, ordering]

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "### 442-1 A. INFREQUENT/IRREGULAR INCOME"
    summary: "Up to $30 per calendar quarter of infrequent or irregular earned income and up to $60 per quarter of unearned income are excluded, allowing up to $90 per quarter in combined exclusions."
    tags: [infrequent income, irregular income, income exclusion, quarterly limit]
    computations:
      - description: "Exclude earned income received infrequently or irregularly up to the quarterly earned threshold."
        variables: [irregular_earned_income, earned_quarterly_limit, excluded_irregular_earned]
        expr_hint: "excluded_irregular_earned = min(irregular_earned_income, 30)"
      - description: "Exclude unearned income received infrequently or irregularly up to the quarterly unearned threshold."
        variables: [irregular_unearned_income, unearned_quarterly_limit, excluded_irregular_unearned]
        expr_hint: "excluded_irregular_unearned = min(irregular_unearned_income, 60)"

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "### 442-1 B. $20 PER MONTH GENERAL INCOME EXCLUSION"
    summary: "The first $20 per month of non-needs-based income is excluded, applied first to unearned income and any remainder to earned income, with only one $20 exclusion allowed per couple."
    tags: [general income exclusion, $20 exclusion, unearned income, earned income]
    computations:
      - description: "Apply $20 general exclusion first to non-needs-based unearned income."
        variables: [non_needs_based_unearned, excluded_unearned, remaining_exclusion]
        expr_hint: "excluded_unearned = min(non_needs_based_unearned, 20); remaining_exclusion = 20 - excluded_unearned"
      - description: "Apply any remaining unused portion of the $20 exclusion to earned income."
        variables: [remaining_exclusion, earned_income, excluded_earned_general]
        expr_hint: "excluded_earned_general = min(earned_income, remaining_exclusion)"

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "### 442-1 C. AMOUNT TO FULFILL A PLAN FOR ACHIEVING SELF-SUPPORT"
    summary: "Earned or unearned income needed to fulfill an SSA- or DVR-approved self-support plan for a blind or disabled recipient is excluded from countable income."
    tags: [self-support plan, income exclusion, blind, disabled, SSA DVR]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "## 442-2 EARNED INCOME EXCLUSIONS"
    summary: "Introduces earned income exclusions for APA, noting they are applied in listed order, never reduce earned income below zero, and unused amounts cannot be applied to unearned income."
    tags: [earned income exclusions, APA, ordering, income calculation]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 A. EARNED INCOME EXCLUSIONS AUTHORIZED BY FEDERAL LAWS"
    summary: "Earned income exclusions specifically authorized by federal law are excluded from income and are enumerated under Section 442-3A."
    tags: [federal law exclusions, earned income, statutory exclusions]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 B. EARNED INCOME TAX CREDIT AND CHILD TAX CREDIT PAYMENTS"
    summary: "EITC and Child Tax Credit payments received as advance payroll payments or year-end tax refunds are excluded from income regardless of the tax year."
    tags: [EITC, Child Tax Credit, income exclusion, tax refund]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 C. INFREQUENT/IRREGULAR EARNED INCOME"
    summary: "Up to $30 of earned income per calendar quarter is excluded if it is infrequent or irregular, per the policy in Section 442-1A."
    tags: [infrequent income, irregular income, earned income exclusion, quarterly limit]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 D. STUDENT EARNED INCOME EXCLUSION"
    summary: "The earned income of a blind or disabled student under age 22 who regularly attends school is excluded up to monthly and annual limits published in Addendum 1."
    tags: [student earned income, blind, disabled, school attendance, income exclusion]
    computations:
      - description: "Exclude student earned income up to the monthly limit, with the annual exclusion not to exceed the annual cap from Addendum 1."
        variables: [student_earned_income, monthly_limit, annual_limit, excluded_student_earned]
        expr_hint: "excluded_student_earned = min(student_earned_income, monthly_limit); cumulative_excluded <= annual_limit"

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 E. $20 PER MONTH GENERAL INCOME EXCLUSION"
    summary: "Any unused portion of the $20 monthly general income exclusion not applied to unearned income in the same month is applied to earned income, once per couple."
    tags: [general income exclusion, $20, earned income, couple]
    computations:
      - description: "Apply any remaining unused $20 general exclusion (after unearned income application) to earned income."
        variables: [remaining_general_exclusion, earned_income, excluded_earned_general]
        expr_hint: "excluded_earned_general = min(earned_income, remaining_general_exclusion)"

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 F. $65 EARNED INCOME EXCLUSION"
    summary: "The first $65 per month of remaining earned income (after prior exclusions) is excluded, applied once per couple."
    tags: [$65 exclusion, earned income, monthly exclusion, couple]
    computations:
      - description: "Exclude $65 per month from the remaining countable earned income."
        variables: [remaining_earned_income, excluded_65, countable_earned_after_65]
        expr_hint: "excluded_65 = min(remaining_earned_income, 65); countable_earned_after_65 = remaining_earned_income - excluded_65"

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 G. IMPAIRMENT RELATED WORK EXPENSES FOR DISABLED"
    summary: "Verified expenses a disabled individual pays for impairment-related items or services necessary to work are excluded from earned income."
    tags: [IRWE, impairment work expenses, disabled, earned income exclusion]
    computations:
      - description: "Deduct verified impairment-related work expenses from remaining countable earned income."
        variables: [remaining_earned_income, impairment_work_expenses, countable_earned_after_irwe]
        expr_hint: "countable_earned_after_irwe = remaining_earned_income - impairment_work_expenses"

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 H. ONE-HALF OF REMAINING EARNED INCOME"
    summary: "One-half of any remaining earned income after all prior exclusions are applied is excluded from countable income."
    tags: [half earned income, income exclusion, earned income, deduction]
    computations:
      - description: "Exclude one-half of the remaining earned income after all prior exclusions."
        variables: [remaining_earned_income, excluded_half, countable_earned_final]
        expr_hint: "excluded_half = remaining_earned_income * 0.5; countable_earned_final = remaining_earned_income * 0.5"

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 I. WORK EXPENSES FOR THE BLIND"
    summary: "Any earned income a blind individual uses to meet work-related expenses is excluded, including a broader range of expenses than the disability IRWE exclusion."
    tags: [blind work expenses, earned income exclusion, blindness, work expenses]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 J. AMOUNT TO FULFILL A PLAN FOR ACHIEVING SELF-SUPPORT"
    summary: "Earned income used to fulfill an approved self-support plan is excluded, per the policy in Section 442-1C."
    tags: [self-support plan, earned income exclusion, blind, disabled]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "## 442-3 UNEARNED INCOME EXCLUSIONS"
    summary: "Introduces the list of income exclusions that apply only to unearned income under APA policy."
    tags: [unearned income exclusions, APA, income policy]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 A. INCOME EXCLUSIONS AUTHORIZED BY FEDERAL LAWS"
    summary: "Lists numerous federally authorized unearned income exclusions including volunteer service payments, education assistance, ANCSA distributions (first $2,000 per year), housing assistance, Indian tribe payments, WWII restitution, and other special program payments."
    tags: [federal exclusions, ANCSA, education assistance, housing, Indian payments]
    computations:
      - description: "Exclude ANCSA cash distributions up to $2,000 per individual per calendar year; amounts above $2,000 are countable income."
        variables: [total_ancsa_distributions, ancsa_exclusion_limit, excluded_ancsa, countable_ancsa]
        expr_hint: "excluded_ancsa = min(total_ancsa_distributions, 2000); countable_ancsa = max(0, total_ancsa_distributions - 2000)"
      - description: "Calculate countable education assistance after subtracting tuition, fees, books, childcare, and transportation costs."
        variables: [total_education_assistance, tuition_fees, books_supplies, childcare, transportation, countable_education_income]
        expr_hint: "countable_education_income = max(0, total_education_assistance - tuition_fees - books_supplies - childcare - transportation)"

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 B. CERTAIN ASSISTANCE BASED ON NEED"
    summary: "Needs-based assistance wholly funded by a state, political subdivision, or Indian tribe and using income as an eligibility factor (such as GRA and Alaska Senior Benefits) is excluded from countable income."
    tags: [needs-based assistance, income exclusion, state programs, GRA, Senior Benefits]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 C. REFUNDS OF TAX PAID ON REAL PROPERTY OR FOOD"
    summary: "Refunds from a public agency for taxes paid on real property or food are excluded from unearned income."
    tags: [tax refunds, real property, food taxes, income exclusion]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 D. DISASTER ASSISTANCE"
    summary: "Assistance received under federal disaster relief statutes following a presidentially declared major disaster is excluded from income."
    tags: [disaster assistance, federal disaster, income exclusion, emergency]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 E. DIVIDENDS AND INTEREST"
    summary: "Dividends and interest on countable resources are excluded from income; dividends and interest on excluded resources may or may not be excluded depending on the nature of the underlying resource."
    tags: [dividends, interest, investment income, countable resources, excluded resources]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 F. FOSTER CARE PAYMENTS AND ADOPTION PAYMENTS"
    summary: "Payments made by a public or private non-profit agency for foster or adoptive care of a child are unearned income to the child, not to the foster or adoptive parent."
    tags: [foster care, adoption, unearned income, child care payments]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 G. INCREASE IN VALUE OF BURIAL FUNDS"
    summary: "Interest accumulation or appreciation on an excluded burial fund is excluded from income."
    tags: [burial fund, interest, income exclusion, appreciation]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 H. HOME ENERGY ASSISTANCE"
    summary: "Home energy assistance provided by a certified private non-profit or government agency based on need is excluded from income."
    tags: [home energy assistance, income exclusion, needs-based, heating assistance]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 I. CHILD SUPPORT PAYMENTS FROM AN ABSENT PARENT"
    summary: "One-third of child support received from an absent parent for a child eligible for SSI or APA is excluded from the child's income; the remaining two-thirds is countable income to the child."
    tags: [child support, absent parent, income exclusion, SSI APA eligible child]
    computations:
      - description: "Exclude one-third of child support payments from an absent parent and count the remaining two-thirds as income to the eligible child."
        variables: [child_support_payment, excluded_child_support, countable_child_support]
        expr_hint: "excluded_child_support = child_support_payment / 3; countable_child_support = child_support_payment * (2/3)"

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "## 442-3 J. DEPOSITS MADE TO A BANK ACCOUNT ON BEHALF OF ANOTHER PERSON"
    summary: "Money deposited into an individual's bank account that they disburse on behalf of another party (acting as agent) is not counted as income to that individual."
    tags: [bank deposits, agent, income exclusion, third-party funds]

  - path: "input/policy_docs/apa_manual/442/442-4 THE ORDER IN WHICH INCOME EXCLUSIONS ARE APPLIED.md"
    heading: "## 442-4 THE ORDER IN WHICH INCOME EXCLUSIONS ARE APPLIED"
    summary: "Specifies the mandatory 10-step sequential order for applying earned income exclusions (federal law exclusions → EITC → infrequent income → student earnings → $20 exclusion → $65 exclusion → IRWE → half exclusion → blind work expenses → self-support plan) to ensure correct APA eligibility and payment calculations."
    tags: [income exclusion order, earned income, sequential application, APA calculation]
    computations:
      - description: "Apply all 10 earned income exclusions in the prescribed sequential order to arrive at final countable earned income."
        variables: [gross_earned_income, federal_exclusions, eitc_exclusion, irregular_exclusion, student_exclusion, general_20_exclusion, dollar_65_exclusion, irwe_exclusion, half_exclusion, blind_work_exclusion, self_support_exclusion, countable_earned_income]

  - path: "input/policy_docs/apa_manual/Addendum 1 PROGRAM STANDARDS.md"
    heading: "# Addendum 1"
    summary: "Provides annual program standard tables for APA and SSI, including Substantial Gainful Activity limits, Student Earned Income Exclusion limits, SSI payment standards by living arrangement, and APA need/payment standards by household type for 2023–2026."
    tags: [program standards, SGA, SSI payment standards, APA payment standards, household type]
    computations:
      - description: "Look up the Substantial Gainful Activity (SGA) monthly limit for the applicable benefit year."
        variables: [benefit_year, sga_monthly_limit]
        expr_hint: "sga_monthly_limit = table[benefit_year]"
      - description: "Look up the student earned income exclusion monthly and annual limits for the applicable benefit year."
        variables: [benefit_year, student_monthly_limit, student_annual_limit]
        expr_hint: "student_monthly_limit = monthly_table[benefit_year]; student_annual_limit = annual_table[benefit_year]"
      - description: "Look up the SSI eligibility and payment standard for a given living arrangement and benefit year."
        variables: [living_arrangement, benefit_year, ssi_payment_standard]
        expr_hint: "ssi_payment_standard = table[living_arrangement][benefit_year]"
      - description: "Look up the APA need/payment standard for a given household type and benefit year."
        variables: [household_type, benefit_year, apa_payment_standard]
        expr_hint: "apa_payment_standard = table[household_type][benefit_year]"
